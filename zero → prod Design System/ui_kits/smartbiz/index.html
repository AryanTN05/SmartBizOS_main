<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SmartBiz OS — product UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@keyframes sb-slide-in { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes sb-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes sb-ping { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
@keyframes sb-bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-4px); opacity: 1; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Jarvis.jsx"></script>
<script type="text/babel" src="Leads.jsx"></script>
<script type="text/babel" src="Automation.jsx"></script>
<script type="text/babel" src="SignIn.jsx"></script>
<script type="text/babel" data-presets="react">
const { useState } = React;

function App() {
  const [authed, setAuthed] = useState(localStorage.getItem("sb-demo") === "1");
  const [screen, setScreen] = useState(localStorage.getItem("sb-screen") || "home");
  const [jarvisOpen, setJarvis] = useState(false);

  const demo = () => { localStorage.setItem("sb-demo", "1"); setAuthed(true); };
  const go = (s) => { localStorage.setItem("sb-screen", s); setScreen(s); };

  if (!authed) return <SignIn onDemo={demo} onSignIn={demo} />;

  const titles = {
    home:    { title: "Home", crumb: ["SmartBiz OS"] },
    leads:   { title: "Leads", crumb: ["SmartBiz OS", "M2 · Sales Intelligence"] },
    flow:    { title: "Automation", crumb: ["SmartBiz OS", "M3 · Workflows"] },
    reports: { title: "Reports", crumb: ["SmartBiz OS", "M6 · Weekly"] },
    docs:    { title: "Docs", crumb: ["SmartBiz OS", "RAG"] },
  };
  const t = titles[screen] || titles.home;

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <SBSidebar active={screen} onNav={go} onJarvis={() => setJarvis(true)} demo />
      <main style={{ flex: 1, minWidth: 0 }}>
        <SBTopBar title={t.title} crumb={t.crumb} demo>
          <SBButton variant="ghost" size="sm" icon="search">Search <SBKbd>⌘K</SBKbd></SBButton>
          <SBButton variant="secondary" size="sm" icon="jarvis" onClick={() => setJarvis(true)}>Ask Jarvis <SBKbd>⌘J</SBKbd></SBButton>
        </SBTopBar>
        {screen === "home" && <Home onOpenJarvis={() => setJarvis(true)} />}
        {screen === "leads" && <LeadsView onOpenJarvis={() => setJarvis(true)} />}
        {screen === "flow" && <AutomationView />}
        {screen === "reports" && <ReportsView />}
        {screen === "docs" && (
          <div style={{ padding: "80px 32px", textAlign: "center", color: "var(--sb-fg-5)" }}>
            <div className="sb-label" style={{ marginBottom: 10 }}>Coming in V1</div>
            <div style={{ fontSize: 14 }}>Doc upload + RAG store. Jarvis can already search docs seeded for the demo.</div>
          </div>
        )}
      </main>
      <JarvisDrawer open={jarvisOpen} onClose={() => setJarvis(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
