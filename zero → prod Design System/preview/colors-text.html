<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#08080a;font-family:"Bricolage Grotesque",sans-serif;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.s{height:110px;border:1px solid #1a1a1c;background:#08080a;display:flex;flex-direction:column;justify-content:space-between;padding:12px;}
.big{font-size:28px;font-weight:800;line-height:1;letter-spacing:-0.03em;}
.h{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#484848;}
.v{font-family:ui-monospace,monospace;font-size:10px;color:#666;}
.bar{height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#e8e8e8;}
</style></head><body>
<div class="row">
  <div class="s"><div class="h">text-primary</div><div class="big" style="color:#e8e8e8">Aa</div><div class="v">#e8e8e8</div></div>
  <div class="s"><div class="h">text-secondary</div><div class="big" style="color:#888">Aa</div><div class="v">#888888</div></div>
  <div class="s"><div class="h">text-tertiary</div><div class="big" style="color:#484848">Aa</div><div class="v">#484848</div></div>
  <div class="s"><div class="h">border-subtle</div><div class="bar" style="border:1px solid #1a1a1c">1px border</div><div class="v">#1a1a1c</div></div>
  <div class="s"><div class="h">border</div><div class="bar" style="border:1px solid #222224">1px border</div><div class="v">#222224</div></div>
</div>
</body></html>
