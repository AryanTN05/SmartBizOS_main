<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:24px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.tag{font-size:10.5px;padding:3px 9px;border-radius:3px;background:#101012;color:#484848;font-weight:500;}
.tag.pill{font-size:10.5px;padding:4px 12px;border-radius:999px;border:1px solid #222224;background:transparent;color:#888;}
.tag.metric{background:rgba(0,255,224,0.08);color:#00ffe0;}
.lbl{font-size:10px;color:#484848;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;}
</style></head><body>
<div>
  <div class="lbl">Service / case-study stack chips</div>

  </div>
</div>
<div>
  <div class="lbl">Skills · pill variant (case study header)</div>
  <div class="row">
    <span class="tag pill">Python</span><span class="tag pill">FFmpeg</span><span class="tag pill">ControlNet</span><span class="tag pill">VLM</span><span class="tag pill">EventBridge</span><span class="tag pill">TTS</span>
  </div>
</div>
<div>
  <div class="lbl">Metric accent chip</div>
  <div class="row">
    <span class="tag metric">400/day</span><span class="tag metric">80%+ faster</span><span class="tag metric">70–85% cost</span>
  </div>
</div>
</body></html>
