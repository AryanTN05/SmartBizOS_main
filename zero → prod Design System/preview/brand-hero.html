<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:36px 40px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;position:relative;overflow:hidden;min-height:100%;}
body::before{content:"";position:absolute;inset:0;background-image:linear-gradient(#888 1px,transparent 1px),linear-gradient(90deg,#888 1px,transparent 1px);background-size:72px 72px;opacity:0.035;mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 100%);}
.c{position:relative;max-width:540px;}
.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.22em;color:#666;font-weight:500;display:flex;align-items:center;gap:10px;margin-bottom:22px;}
.eyebrow::before{content:"";width:22px;height:1px;background:#00ffe0;opacity:0.6;}
h1{font-size:56px;font-weight:500;letter-spacing:-0.035em;line-height:1;margin:0 0 18px;color:#f0f0f0;}
.accent{color:#00ffe0;position:relative;}
.accent::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:#00ffe0;opacity:0.35;}
.sub{font-size:15px;color:#888;max-width:380px;margin:0 0 26px;line-height:1.5;font-weight:400;}
.ctas{display:flex;gap:20px;align-items:center;}
.btn{background:#00ffe0;color:#000;padding:12px 22px;font-size:12.5px;font-weight:600;letter-spacing:0.01em;}
.ghost{color:#b8b8b8;font-size:12.5px;font-weight:500;letter-spacing:0.02em;}
</style></head><body><div class="c">
<div class="eyebrow">Zero to Prod</div>
<h1>From zero<br>to <span class="accent">production.</span></h1>
<p class="sub">We take your idea and build it into a real, deployed product.</p>
<div class="ctas"><a class="btn">Book a Call</a><a class="ghost">See Our Work →</a></div>
</div></body></html>
