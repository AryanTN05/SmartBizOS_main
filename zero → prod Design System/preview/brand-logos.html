<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:20px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.s{border:1px solid #1a1a1c;background:#0b0b0d;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;min-height:180px;position:relative;}
.s img{max-width:100%;max-height:100px;object-fit:contain;}
.lbl{position:absolute;top:8px;left:10px;font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:#484848;}
.v{font-family:ui-monospace,monospace;font-size:9.5px;color:#666;text-align:center;}
.white{background:#f5f3ef;}
</style></head><body>
<div class="grid">
  <div class="s"><div class="lbl">Mark only</div><img src="../assets/Master_logo1-removebg.png"><div class="v">Master_logo1-removebg.png<br>nav · favicon · icon</div></div>
  <div class="s"><div class="lbl">Full wordmark</div><img src="../assets/Master_Logo_Full.png"><div class="v">Master_Logo_Full.png<br>footer · deck covers</div></div>
  <div class="s"><div class="lbl">Banner</div><img src="../assets/LinkedIn_Banner.png"><div class="v">LinkedIn_Banner.png<br>social share</div></div>
  <div class="s white"><div class="lbl" style="color:#999">Light ground</div><img src="../assets/Master_logo1-removebg.png"><div class="v" style="color:#888">mark reads on paper/light</div></div>
  <div class="s"><div class="lbl">SVG full</div><img src="../assets/ZP_Logo.svg"><div class="v">ZP_Logo.svg</div></div>
  <div class="s"><div class="lbl">SVG small</div><img src="../assets/ZP_Logo_S.svg"><div class="v">ZP_Logo_S.svg</div></div>
</div>
</body></html>
