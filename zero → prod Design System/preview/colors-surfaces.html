<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:20px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;font-size:12px;}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;}
.s{height:110px;border:1px solid var(--border-subtle);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
.s .n{font-weight:700;font-size:12px;color:#e8e8e8;}
.s .h{font-size:10px;color:#888;letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;}
.s .v{font-family:ui-monospace,monospace;font-size:10px;color:#666;margin-top:4px;}
</style></head><body>
<div class="row">
  <div class="s" style="background:#08080a"><div class="h">Page</div><div class="n">bg-primary</div><div class="v">#08080a</div></div>
  <div class="s" style="background:#101012"><div class="h">Section</div><div class="n">bg-secondary</div><div class="v">#101012</div></div>
  <div class="s" style="background:#151517"><div class="h">Card</div><div class="n">bg-card</div><div class="v">#151517</div></div>
  <div class="s" style="background:#1c1c1f"><div class="h">Card · hover</div><div class="n">bg-card-hover</div><div class="v">#1c1c1f</div></div>
  <div class="s" style="background:#000"><div class="h">Pure</div><div class="n">black</div><div class="v">#000000</div></div>
</div>
</body></html>
