<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;padding:24px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.n{border:1px solid #1a1a1c;padding:16px 18px;display:flex;align-items:baseline;gap:14px;}
.num{font-family:"Mona Sans",sans-serif;font-weight:300;font-stretch:75%;font-size:58px;line-height:1;color:#222224;}
.lbl{font-size:13px;font-weight:700;}
.cap{font-family:ui-monospace,monospace;font-size:9px;color:#666;margin-top:12px;}
</style></head><body>
<div class="grid">
  <div class="n"><div class="num">01</div><div class="lbl">Discover</div></div>
  <div class="n"><div class="num">02</div><div class="lbl">Design</div></div>
  <div class="n"><div class="num">03</div><div class="lbl">Build</div></div>
  <div class="n"><div class="num">04</div><div class="lbl">Deploy</div></div>
</div>
<div class="cap">Mona Sans · weight 300 · stretch 75% · used only for Process numerals. Number hovers to <code>#00ffe0</code>.</div>
</body></html>
