<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;padding:20px;background:#08080a;font-family:"Bricolage Grotesque",system-ui,sans-serif;color:#e8e8e8;}
.row{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:10px;}
.s{height:140px;border:1px solid #1a1a1c;background:#08080a;display:flex;flex-direction:column;justify-content:space-between;padding:14px;position:relative;overflow:hidden;}
.chip{width:46px;height:46px;}
.h{font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#484848;}
.n{font-weight:700;font-size:13px;}
.v{font-family:ui-monospace,monospace;font-size:10px;color:#666;}
.glow{position:absolute;inset:-40px;background:radial-gradient(circle,rgba(0,255,224,0.18),transparent 60%);}
</style></head><body>
<div class="row">
  <div class="s">
    <div class="glow"></div>
    <div style="position:relative"><div class="h">accent</div><div class="n" style="color:#00ffe0;text-shadow:0 0 30px rgba(0,255,224,0.6)">From zero to production.</div></div>
    <div style="position:relative;display:flex;align-items:center;gap:10px"><div class="chip" style="background:#00ffe0"></div><div><div class="v">#00ffe0</div><div class="v" style="color:#888">primary signal</div></div></div>
  </div>
  <div class="s"><div class="h">accent-dim</div><div class="chip" style="background:#00ccb3"></div><div class="v">#00ccb3<br><span style="color:#888">hover shade</span></div></div>
  <div class="s"><div class="h">accent-glow</div><div class="chip" style="background:rgba(0,255,224,0.12)"></div><div class="v">rgba(0,255,224,0.12)<br><span style="color:#888">halo bg</span></div></div>
  <div class="s"><div class="h">Selection</div><div style="background:#00ffe0;color:#000;padding:4px 8px;display:inline-block;font-size:13px;font-weight:600;align-self:flex-start">highlighted text</div><div class="v">::selection</div></div>
</div>
</body></html>
