<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:24px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.row{border-bottom:1px solid #222224;padding:16px 0;}
.q{display:flex;justify-content:space-between;align-items:center;}
.q span{font-size:14px;font-weight:700;}
.q .closed{color:#888;}
.q .open{color:#e8e8e8;}
.plus{font-size:22px;font-weight:300;color:#484848;line-height:1;display:inline-block;transition:transform .3s;}
.plus.x{transform:rotate(45deg);}
.a{margin-top:10px;font-size:13px;color:#888;line-height:1.6;max-width:560px;}
.lbl{font-size:9px;color:#484848;text-transform:uppercase;letter-spacing:0.15em;}
</style></head><body>
<div class="row">
  <div class="lbl" style="margin-bottom:4px">Closed</div>
  <div class="q"><span class="closed">How does pricing work?</span><span class="plus">+</span></div>
</div>
<div class="row">
  <div class="lbl" style="margin-bottom:4px">Open · row spring-expands · plus rotates 45° → ×</div>
  <div class="q"><span class="open">How long does it take to build a product?</span><span class="plus x">+</span></div>
  <div class="a">Most MVPs take 2–3 weeks depending on scope. We'll give you a detailed timeline after our discovery call — and we stick to it. No endless slipping deadlines.</div>
</div>
</body></html>
