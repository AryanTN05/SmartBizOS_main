<!doctype html><html><head><meta charset="utf-8"><style>
body{margin:0;padding:20px;background:#08080a;font-family:"Bricolage Grotesque",system-ui,sans-serif;color:#e8e8e8;}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.s{height:130px;border:1px solid #1a1a1c;padding:12px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
.h{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#484848;}
.node{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,0.7);border:2px solid var(--c);display:block;}
.line{height:2px;width:100%;background:var(--c);opacity:0.45;}
.v{font-family:ui-monospace,monospace;font-size:9.5px;color:#666;}
.l{font-weight:700;font-size:11px;}
</style></head><body>
<div class="row">
  <div class="s" style="--c:#c084fc"><div class="h">Creative</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#c084fc">violet</div><div class="v">#c084fc</div></div></div>
  <div class="s" style="--c:#00ffe0"><div class="h">Legal</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#00ffe0">cyan</div><div class="v">#00ffe0</div></div></div>
  <div class="s" style="--c:#34d399"><div class="h">Lead Intel</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#34d399">emerald</div><div class="v">#34d399</div></div></div>
  <div class="s" style="--c:#fbbf24"><div class="h">Finance</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#fbbf24">amber</div><div class="v">#fbbf24</div></div></div>
  <div class="s" style="--c:#60a5fa"><div class="h">Ops</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#60a5fa">blue</div><div class="v">#60a5fa</div></div></div>
  <div class="s" style="--c:#f472b6"><div class="h">Healthcare</div><div style="display:flex;align-items:center;gap:6px"><span class="node"></span><span class="line"></span></div><div><div class="l" style="color:#f472b6">pink</div><div class="v">#f472b6</div></div></div>
</div>
</body></html>
