<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:0;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.label{font-size:10px;text-transform:uppercase;letter-spacing:0.15em;color:#484848;padding:14px 24px 6px;}
nav{height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:color-mix(in srgb,#08080a 94%,transparent);backdrop-filter:blur(24px);border-bottom:1px solid #1a1a1c;}
.brand{display:flex;align-items:center;height:40px;}
.brand img{height:40px;}
.links{display:flex;gap:28px;}
.links a{color:#e8e8e8;opacity:0.9;font-size:12.5px;font-weight:700;letter-spacing:0.01em;text-decoration:none;}
.cta{background:#00ffe0;color:#000;padding:6px 18px;font-size:12.5px;font-weight:600;}
.scroll-hint{font-size:10px;color:#484848;padding:12px 24px 20px;font-family:ui-monospace,monospace;}
</style></head><body>
<div class="label">Desktop nav · sticky · hides on scroll-down</div>
<nav>
  <div class="brand"><img src="../assets/Master_logo1-removebg.png" alt="zero → prod"></div>
  <div class="links">
    <a>Services</a><a>Process</a><a>Work</a><a>Case studies</a><a>About</a><a>FAQ</a>
  </div>
  <a class="cta">Book a Call</a>
</nav>
<div class="scroll-hint">backdrop-blur-xl · border-bottom 1px #1a1a1c · hides on scroll-down (translateY 300ms easeInOut)</div>
</body></html>
