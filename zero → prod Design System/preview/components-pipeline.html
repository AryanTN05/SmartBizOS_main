<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;padding:20px;background:#08080a;color:#e8e8e8;font-family:"Bricolage Grotesque",sans-serif;}
.cap{font-size:10px;color:#484848;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:10px;}
svg{width:100%;height:auto;display:block;}
@keyframes march{to{stroke-dashoffset:-28;}}
@keyframes travel{to{transform:translateX(540px);}}
@keyframes pulse{0%{r:22;opacity:.35}100%{r:36;opacity:0}}
.dash{animation:march 1.2s linear infinite;}
.particle{animation:travel 3s linear infinite;}
.ring{animation:pulse 3s ease-out infinite;}
.ring:nth-child(2){animation-delay:.75s}
.ring:nth-child(3){animation-delay:1.5s}
</style></head><body>
